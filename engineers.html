<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A/S Admin - 엔지니어</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="css/partials.js"></script>
<style>
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1000; }
  .modal-backdrop.show { display: flex; align-items: center; justify-content: center; }
  .modal-box { background: #fff; width: 460px; max-width: 92vw; border-radius: 6px; padding: 0; overflow: hidden; }
  .modal-header { background: #1e2939; color: #fff; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .modal-header span { font-weight: bold; font-size: 14px; }
  .close-btn { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; }
  .modal-body { padding: 16px; }
  .modal-body table { width: 100%; border-collapse: collapse; }
  .modal-body td { padding: 6px 4px; font-size: 13px; }
  .modal-body td.lbl { width: 100px; color: #555; }
  .modal-body input, .modal-body select { width: 100%; padding: 6px 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; }
  .modal-foot { padding: 10px 14px; border-top: 1px solid #eee; text-align: right; }
  .modal-foot button { padding: 6px 14px; font-size: 13px; cursor: pointer; margin-left: 6px; }
  .modal-msg { font-size: 12px; min-height: 16px; padding: 6px 10px; }
  .modal-msg.err { color: #c00; }
  .modal-msg.ok { color: #060; }
</style>
<script>
let ENGINEERS = [];
let IS_ADMIN = false;

const ROLE_LABEL = { admin: "관리자", engineer: "엔지니어", office: "사무/경리" };

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

async function loadList() {
  const tb = document.getElementById("engBody");
  tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;">불러오는 중...</td></tr>';
  if (!window.SB_CONFIGURED) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:#a06;">Supabase 미설정 - js/supabase-config.js 참고</td></tr>';
    return;
  }
  const data = await window.dbEngineersAll();
  ENGINEERS = data || [];
  renderList(getQueryFilter(ENGINEERS));
}

function getQueryFilter(rows) {
  const f = document.getElementById("f_name").value;
  const q = (document.getElementById("f_value").value || "").trim().toLowerCase();
  if (!q) return rows;
  return rows.filter(r => String(r[f === "en_id" ? "en_id" : "en_name"] || "").toLowerCase().includes(q));
}

function renderList(rows) {
  const tb = document.getElementById("engBody");
  document.getElementById("totalCount").textContent = rows.length;
  if (!rows.length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;">등록된 엔지니어가 없습니다.</td></tr>';
    return;
  }
  tb.innerHTML = rows.map(r => {
    const actions = IS_ADMIN
      ? `<a href="javascript:goedit('${escapeHtml(r.en_id)}');">변경</a>
         &nbsp;|&nbsp;
         <a href="javascript:godel('${escapeHtml(r.en_id)}', '${escapeHtml(r.en_name)}');">삭제</a>`
      : `<span style="color:#aaa;">-</span>`;
    return `
    <tr>
      <td>${escapeHtml(r.en_branch)}</td>
      <td>${escapeHtml(r.en_id)}</td>
      <td>${escapeHtml(r.en_name)}</td>
      <td>${escapeHtml(r.en_tel || "")}</td>
      <td>${escapeHtml(r.en_mobile || "")}</td>
      <td>${escapeHtml((r.created_at || "").substring(0, 10))}</td>
      <td>${actions}</td>
    </tr>`;
  }).join("");
}

function applyFilter() { renderList(getQueryFilter(ENGINEERS)); }

function openAddModal() {
  if (!IS_ADMIN) { alert("관리자만 계정을 만들 수 있습니다."); return; }
  document.getElementById("addMsg").textContent = "";
  document.getElementById("addForm").reset();
  document.getElementById("addModal").classList.add("show");
  setTimeout(() => document.getElementById("a_username").focus(), 50);
}
function closeAddModal() { document.getElementById("addModal").classList.remove("show"); }

async function submitAdd() {
  const f = document.getElementById("addForm");
  const username = f.a_username.value.trim();
  const password = f.a_password.value;
  const en_name = f.a_name.value.trim();
  const en_id = f.a_id.value.trim() || username;
  const en_branch = f.a_branch.value || "대구";
  const en_tel = f.a_tel.value.trim();
  const en_mobile = f.a_mobile.value.trim();
  const en_role = f.a_role.value || "engineer";

  const msg = document.getElementById("addMsg");
  msg.className = "modal-msg";
  if (!username || !password || !en_name) { msg.textContent = "아이디/비밀번호/성명은 필수"; msg.classList.add("err"); return; }

  document.getElementById("addBtn").disabled = true;
  msg.textContent = "처리 중...";
  const { data, error } = await window.fnCreateEngineer({
    username, password, en_id, en_name, en_branch, en_tel, en_mobile, en_role,
  });
  document.getElementById("addBtn").disabled = false;
  if (error) { msg.textContent = "실패: " + error; msg.classList.add("err"); return; }
  msg.textContent = "등록 완료"; msg.classList.add("ok");
  await loadList();
  setTimeout(closeAddModal, 600);
}

async function godel(en_id, en_name) {
  if (!IS_ADMIN) { alert("관리자만 삭제할 수 있습니다."); return; }
  if (!confirm(`엔지니어 [${en_name} (${en_id})] 를 삭제하시겠습니까?\n로그인 계정도 함께 제거됩니다.`)) return;
  const { error } = await window.fnDeleteEngineer(en_id);
  if (error) { alert("삭제 실패: " + error); return; }
  await loadList();
}

function goedit(en_id) {
  if (!IS_ADMIN) { alert("관리자만 변경할 수 있습니다."); return; }
  const r = ENGINEERS.find(x => x.en_id === en_id);
  if (!r) { alert("대상을 찾을 수 없습니다."); return; }
  const f = document.getElementById("editForm");
  f.reset();
  document.getElementById("editMsg").textContent = "";
  document.getElementById("e_id_label").textContent = r.en_id;
  f.e_id.value = r.en_id;
  f.e_name.value = r.en_name || "";
  f.e_branch.value = r.en_branch || "문경";
  f.e_tel.value = r.en_tel || "";
  f.e_mobile.value = r.en_mobile || "";
  f.e_role.value = ROLE_LABEL[r.en_role] ? r.en_role : "engineer";
  f.e_password.value = "";
  document.getElementById("editModal").classList.add("show");
}
function closeEditModal() { document.getElementById("editModal").classList.remove("show"); }

async function submitEdit() {
  const f = document.getElementById("editForm");
  const en_id = f.e_id.value;
  const en_name = f.e_name.value.trim();
  const en_branch = f.e_branch.value || "문경";
  const en_tel = f.e_tel.value.trim();
  const en_mobile = f.e_mobile.value.trim();
  const en_role = f.e_role.value || "engineer";
  const password = f.e_password.value;

  const msg = document.getElementById("editMsg");
  msg.className = "modal-msg";
  if (!en_name) { msg.textContent = "성명은 필수"; msg.classList.add("err"); return; }
  if (password && password.length < 6) { msg.textContent = "비밀번호는 6자 이상"; msg.classList.add("err"); return; }

  const payload = { en_id, en_name, en_branch, en_tel, en_mobile, en_role };
  if (password) payload.password = password;

  document.getElementById("editBtn").disabled = true;
  msg.textContent = "처리 중...";
  const { error } = await window.fnUpdateEngineer(payload);
  document.getElementById("editBtn").disabled = false;
  if (error) { msg.textContent = "실패: " + error; msg.classList.add("err"); return; }
  msg.textContent = "변경 완료"; msg.classList.add("ok");
  await loadList();
  setTimeout(closeEditModal, 600);
}

document.addEventListener("DOMContentLoaded", async () => {
  document.getElementById("f_value").addEventListener("input", applyFilter);
  document.getElementById("f_name").addEventListener("change", applyFilter);
  try { IS_ADMIN = await window.currentIsAdmin(); } catch (e) { IS_ADMIN = false; }
  // 계정 생성은 관리자만 — 신규입력 버튼은 관리자에게만 노출
  const addBtn = document.getElementById("btnAddEng");
  if (addBtn) addBtn.style.display = IS_ADMIN ? "" : "none";
  loadList();
});
</script>
</head>
<body>
<div class="app">
  <header class="app-header" id="app-header"></header>

  <main class="app-main">
    <div class="content-wrap">
      <div class="page-title">엔지니어 관리</div>

      <table class="outer-table"><tr><td>
        <table class="search-box">
          <form name="frm1" onsubmit="event.preventDefault();applyFilter();">
          <tr>
            <td>
              <select name="f_name" id="f_name">
                <option value="en_id">엔지니어 아이디</option>
                <option value="en_name">엔지니어 성명</option>
              </select>
              <input type="text" name="f_value" id="f_value">
              <input type="submit" value="검색" name="submit">
              <input type="button" id="btnAddEng" value="신규입력" onclick="openAddModal()" style="display:none;">
            </td>
            <td><a href="engineers.html">[처음으로]</a></td>
          </tr>
          </form>
          <tr>
            <td colspan="2" class="alt right">검색된 게시물수 : <b id="totalCount">0</b>명</td>
          </tr>
        </table>

        <table class="data-table">
          <thead>
            <tr>
              <th width="15%">근무지역</th>
              <th width="15%">아이디</th>
              <th width="15%">성명</th>
              <th width="15%">전화번호</th>
              <th width="15%">휴대폰</th>
              <th width="15%">최종등록일</th>
              <th width="10%">삭제</th>
            </tr>
          </thead>
          <tbody id="engBody">
            <tr><td colspan="7" style="text-align:center;padding:20px;">불러오는 중...</td></tr>
          </tbody>
        </table>

      </td></tr></table>
    </div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>
</div>

<!-- 신규 엔지니어 추가 모달 -->
<div id="addModal" class="modal-backdrop" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>신규 엔지니어 등록</span>
      <button type="button" class="close-btn" onclick="closeAddModal()">×</button>
    </div>
    <div class="modal-body">
      <form id="addForm" onsubmit="event.preventDefault();submitAdd();">
        <table>
          <tr><td class="lbl">아이디 *</td><td><input type="text" id="a_username" name="a_username" required placeholder="engineer1" autocomplete="off"></td></tr>
          <tr><td class="lbl">비밀번호 *</td><td><input type="text" id="a_password" name="a_password" required placeholder="(자유)" autocomplete="off"></td></tr>
          <tr><td class="lbl">성명 *</td><td><input type="text" id="a_name" name="a_name" required placeholder="홍길동"></td></tr>
          <tr><td class="lbl">표시 ID</td><td><input type="text" id="a_id" name="a_id" placeholder="(미입력 시 아이디 그대로)"></td></tr>
          <tr><td class="lbl">근무지역</td><td>
            <select id="a_branch" name="a_branch">
              <option value="문경">문경</option>
              <option value="대구">대구</option>
            </select>
          </td></tr>
          <tr><td class="lbl">전화번호</td><td><input type="text" id="a_tel" name="a_tel" placeholder="053-587-4114"></td></tr>
          <tr><td class="lbl">휴대폰</td><td><input type="text" id="a_mobile" name="a_mobile" placeholder="010-0000-0000"></td></tr>
          <tr><td class="lbl">권한</td><td>
            <select id="a_role" name="a_role">
              <option value="admin">관리자</option>
              <option value="engineer">엔지니어</option>
              <option value="office">사무/경리</option>
            </select>
          </td></tr>
        </table>
      </form>
    </div>
    <div class="modal-msg" id="addMsg"></div>
    <div class="modal-foot">
      <button type="button" onclick="closeAddModal()">취소</button>
      <button type="button" id="addBtn" onclick="submitAdd()">등록</button>
    </div>
  </div>
</div>

<!-- 엔지니어 변경 모달 (관리자만) -->
<div id="editModal" class="modal-backdrop" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>엔지니어 변경</span>
      <button type="button" class="close-btn" onclick="closeEditModal()">×</button>
    </div>
    <div class="modal-body">
      <form id="editForm" onsubmit="event.preventDefault();submitEdit();">
        <input type="hidden" id="e_id" name="e_id">
        <table>
          <tr><td class="lbl">아이디</td><td><b id="e_id_label" style="font-size:13px;"></b></td></tr>
          <tr><td class="lbl">성명 *</td><td><input type="text" id="e_name" name="e_name" required placeholder="홍길동"></td></tr>
          <tr><td class="lbl">근무지역</td><td>
            <select id="e_branch" name="e_branch">
              <option value="문경">문경</option>
              <option value="대구">대구</option>
            </select>
          </td></tr>
          <tr><td class="lbl">전화번호</td><td><input type="text" id="e_tel" name="e_tel" placeholder="053-587-4114"></td></tr>
          <tr><td class="lbl">휴대폰</td><td><input type="text" id="e_mobile" name="e_mobile" placeholder="010-0000-0000"></td></tr>
          <tr><td class="lbl">권한</td><td>
            <select id="e_role" name="e_role">
              <option value="admin">관리자</option>
              <option value="engineer">엔지니어</option>
              <option value="office">사무/경리</option>
            </select>
          </td></tr>
          <tr><td class="lbl">비밀번호</td><td><input type="text" id="e_password" name="e_password" placeholder="(변경할 때만 입력, 6자 이상)" autocomplete="off"></td></tr>
        </table>
      </form>
    </div>
    <div class="modal-msg" id="editMsg"></div>
    <div class="modal-foot">
      <button type="button" onclick="closeEditModal()">취소</button>
      <button type="button" id="editBtn" onclick="submitEdit()">저장</button>
    </div>
  </div>
</div>
</body>
</html>
