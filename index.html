<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>디직스코리아 통합 관리</title>
<script>
  // 기본 진입 → 임대관리 통합 포털(lease/asms.html).
  // 단, 비밀번호 재설정 메일 redirect(#type=recovery)는 A/S 로그인으로 그대로 보낸다.
  (function () {
    const hash = location.hash || "";
    if (hash && hash.includes("type=recovery")) {
      location.replace("login.html" + hash);
    } else {
      location.replace("lease/asms.html");
    }
  })();
</script>
<meta http-equiv="refresh" content="2; url=lease/asms.html">
</head>
<body>
<p>디직스코리아 관리 시스템으로 이동합니다... <a href="lease/asms.html">바로가기</a></p>
</body>
</html>
