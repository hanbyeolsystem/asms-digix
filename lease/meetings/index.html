<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>음성미팅관리 — 디직스코리아</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(180deg, #f7f8fb 0%, #eef1f7 100%);
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    box-sizing: border-box;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0, 30, 80, 0.08);
    padding: 36px 28px;
    text-align: center;
  }
  .logo {
    font-size: 56px;
    margin-bottom: 12px;
    line-height: 1;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 20px;
    color: #1a1a1a;
    font-weight: 700;
  }
  .subtitle {
    margin: 0 0 28px;
    font-size: 14px;
    color: #666;
  }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    background: #e8f0ff;
    color: #0058d8;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 24px;
  }
  .open-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
    color: #fff;
    border: 0;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    box-sizing: border-box;
    box-shadow: 0 4px 14px rgba(0, 102, 255, 0.3);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .open-btn:hover {
    box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
  }
  .open-btn:active {
    transform: scale(0.98);
  }
  .open-btn .arrow {
    margin-left: 6px;
  }
  .hint {
    margin: 18px 0 0;
    font-size: 12px;
    color: #888;
    line-height: 1.6;
  }
  .status {
    margin-top: 14px;
    font-size: 12px;
    color: #0066ff;
    min-height: 16px;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="logo">🎙️</div>
    <span class="badge">Plaud · 회사업무관련</span>
    <h1>음성미팅관리</h1>
    <p class="subtitle">Plaud 웹에서 녹음·전사·요약을 관리합니다</p>

    <a
      class="open-btn"
      id="openBtn"
      href="https://web.plaud.ai/file-list?tagId=168d07803883e8b3e8dba9046d98099a&categoryId=%ED%9A%8C%EC%82%AC%EC%97%85%EB%AC%B4%EA%B4%80%EB%A0%A8"
      target="plaud_meetings"
      rel="noopener">
      Plaud 회사업무관련 열기<span class="arrow">→</span>
    </a>

    <div class="status" id="status"></div>

    <p class="hint">
      처음 누르면 새 탭이 열리고,<br>
      다시 누르면 같은 탭으로 이동합니다.
    </p>
  </div>
</div>

<script>
  (function() {
    var btn = document.getElementById('openBtn');
    var status = document.getElementById('status');

    btn.addEventListener('click', function() {
      status.textContent = 'Plaud 탭으로 이동했습니다';
      setTimeout(function() { status.textContent = ''; }, 2500);
    });
  })();
</script>

</body>
</html>
