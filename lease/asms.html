<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=20260611"></script>
<script src="auth.js"></script>
<style>
#nt2-wrap{border-bottom:1px solid #d1d5db;background:#fff;font-size:13px;}
#nt2-head{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:#f7f9fb;border-bottom:1px solid #eef1f5;}
#nt2-head b{color:#1e2939;font-size:13px;}
.nt2-btn{background:#fff;border:1px solid #c2c8d0;border-radius:3px;padding:2px 9px;font-size:12px;cursor:pointer;}
.nt2-btn:hover{background:#f1f3f6;}
#nt2-split{display:flex;}
#nt2-list-col{width:280px;flex-shrink:0;border-right:1px solid #eef1f5;}
#nt2-list{list-style:none;margin:0;padding:0;}
#nt2-list li{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f3f5f8;cursor:pointer;}
#nt2-list li:hover{background:#f7f9fb;}
#nt2-list li.nt2-active{background:#eff6ff;}
.nt2-tag{background:#fdecec;color:#b42121;border:1px solid #f5c9c9;border-radius:3px;font-size:11px;padding:1px 6px;white-space:nowrap;flex-shrink:0;}
.nt2-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1d4ed8;}
.nt2-item-date{color:#98a2b3;font-size:11.5px;white-space:nowrap;}
.nt2-del{color:#c0392b;cursor:pointer;font-size:12px;flex-shrink:0;}
.nt2-empty{padding:8px 12px;color:#98a2b3;}
#nt2-view{flex:1;display:none;flex-direction:column;}
#nt2-view.show{display:flex;}
#nt2-view-head{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#f7f9fb;border-bottom:1px solid #eef1f5;flex-shrink:0;}
#nt2-view-title{font-size:14px;font-weight:bold;color:#1e2939;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#nt2-view-close{background:none;border:none;font-size:16px;cursor:pointer;color:#666;padding:0 4px;flex-shrink:0;}
#nt2-view-meta{padding:5px 14px;font-size:12px;color:#888;border-bottom:1px solid #f3f5f8;flex-shrink:0;}
#nt2-view-body{padding:12px 14px;font-size:13.5px;line-height:1.8;white-space:pre-wrap;color:#222;overflow-y:auto;max-height:200px;}
</style>
</head>
<body>

<button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴">☰</button>

<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-brand">
      <span class="brand-mark">🖨</span>
      <span class="brand-text">디직스코리아</span>
    </a>
    <a href="asms.html" class="sidebar-tool active">
      <span class="nav-icon">🛠</span>
      <span>접수관리툴</span>
    </a>
    <a href="errorcode.html" class="sidebar-tool">
      <span class="nav-icon">🔧</span>
      <span>에러코드</span>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-group collapsed" id="rental-group">
        <button type="button" class="sidebar-group-label" id="rental-group-toggle" aria-expanded="false">
          <span class="group-caret">▶</span><span>임대 관리</span>
        </button>
        <div class="sidebar-subnav">
          <a href="rental-customers/index.html"><span class="nav-icon">👥</span><span>임대거래처</span></a>
          <a href="rental-equipment/index.html"><span class="nav-icon">🖥</span><span>임대장비관리</span></a>
          <a href="visit-schedule/index.html"><span class="nav-icon">🗓</span><span>정기방문관리</span><span id="vs-badge" style="display:none;margin-left:auto;background:#dc2626;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;line-height:16px;text-align:center;border-radius:8px;padding:0 4px;"></span></a>
          <a href="rental-counters/index.html"><span class="nav-icon">🖨</span><span>임대카운터</span></a>
          <a href="rental-billing/index.html"><span class="nav-icon">💰</span><span>임대추가요금청구</span></a>
          <a href="rental-invoice/index.html"><span class="nav-icon">🧾</span><span>임대명세표/계산서</span></a>
          <a href="rental-status/index.html" data-role-only="admin"><span class="nav-icon">🏠</span><span>임대현황</span></a>
        </div>
      </div>
      <a href="board/index.html"><span class="nav-icon">🗂</span><span>자료실</span></a>
      <a href="admin-users.html" data-role-only="admin"><span class="nav-icon">👑</span><span>사용자 관리</span></a>
    </nav>
    <div class="sidebar-foot">디직스코리아</div>
  </aside>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <div class="main-area errorcode-area">
    <div class="errorcode-toolbar">
      <h1 class="errorcode-title" id="frame-title"><span>🛠</span> 접수관리툴 (ASMS)</h1>
      <div class="errorcode-actions">
        <a href="https://digix.co.kr/orders.html" target="_blank" rel="noopener" class="btn ghost small" id="btn-open-new" title="새 창에서 열기">↗ 새 창</a>
        <button class="btn ghost small" id="btn-reload" title="새로고침">↻ 새로고침</button>
      </div>
    </div>
    <div id="nt2-wrap">
      <div id="nt2-head">
        <b>📢 공지사항</b>
        <span id="nt2-admin"></span>
      </div>
      <div id="nt2-split">
        <div id="nt2-list-col">
          <ul id="nt2-list"><li class="nt2-empty">불러오는 중…</li></ul>
        </div>
        <div id="nt2-view">
          <div id="nt2-view-head">
            <span id="nt2-view-title"></span>
            <button id="nt2-view-close" title="닫기">✕</button>
          </div>
          <div id="nt2-view-meta"></div>
          <div id="nt2-view-body"></div>
        </div>
      </div>
    </div>
    <iframe
      id="asms-iframe"
      src="https://digix.co.kr/orders.html"
      title="접수관리툴 ASMS"
      loading="lazy">
    </iframe>
  </div>
</div>

<script>
const ASMS_HOME_URL = 'https://digix.co.kr/orders.html';
const HANBYUL_AUTOPOST_URL = 'https://hanbyeolsystem.github.io/hanbyul-autopost/';
const SESSION_V = String(Date.now());
const iframe   = document.getElementById('asms-iframe');
const title    = document.getElementById('frame-title');
const openNew  = document.getElementById('btn-open-new');
const sidebar  = document.getElementById('sidebar');
const backdrop = document.getElementById('sidebar-backdrop');

document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  backdrop.classList.toggle('show');
});
backdrop?.addEventListener('click', () => {
  sidebar.classList.remove('open');
  backdrop.classList.remove('show');
});
document.getElementById('btn-reload')?.addEventListener('click', () => {
  hardReload();
});

/** 사이드바 메뉴 클릭 가로채기 — 페이지 이동 없이 iframe.src 만 변경. */
function bindSidebarLinks() {
  const links = sidebar.querySelectorAll('.sidebar-tool, .sidebar-nav a');
  links.forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('#')) return;
    a.addEventListener('click', e => {
      e.preventDefault();
      links.forEach(x => x.classList.remove('active'));
      a.classList.add('active');

      // 타이틀 갱신
      const icon  = a.querySelector('.nav-icon')?.textContent || '📄';
      const label = a.querySelector('span:last-child')?.textContent || a.textContent.trim();
      title.innerHTML = `<span>${icon}</span> ${label}`;

      // iframe.src
      let target;
      let externalUrl = '';
      if (href === 'asms.html') {
        target = ASMS_HOME_URL;
        externalUrl = ASMS_HOME_URL;
      } else if (href === 'autopost.html') {
        target = HANBYUL_AUTOPOST_URL;
        externalUrl = HANBYUL_AUTOPOST_URL;
      } else {
        // 같은 사이트의 페이지 — embed=1 + 세션 캐시버스터
        const u = new URL(href, location.href);
        u.searchParams.set('embed', '1');
        u.searchParams.set('v', SESSION_V);
        target = u.toString();
      }
      iframe.src = target;
      openNew.href = externalUrl || new URL(href, location.href).toString();

      // 모바일 사이드바 닫기
      sidebar.classList.remove('open');
      backdrop.classList.remove('show');

      // 주소창에 #path 만 살짝 기록 (북마크/새로고침 시 복원)
      history.replaceState(null, '', '#' + href);
    });
  });
}

/** 새로고침 시 #path 가 있으면 그 위치로 복원. */
function restoreFromHash() {
  const h = decodeURIComponent(location.hash.replace(/^#/, ''));
  if (!h) return;
  const a = sidebar.querySelector(`.sidebar-nav a[href="${h}"], .sidebar-tool[href="${h}"]`);
  if (a) a.click();
}

/** "임대 관리" 라벨 토글 — 클릭 시 4개 하위 메뉴 접기/펼치기 */
function bindGroupToggle() {
  const group = document.getElementById('rental-group');
  const btn   = document.getElementById('rental-group-toggle');
  if (!group || !btn) return;

  const apply = expanded => {
    group.classList.toggle('collapsed', !expanded);
    btn.setAttribute('aria-expanded', String(expanded));
    try { localStorage.setItem('digix.rental-group', expanded ? '1' : '0'); } catch {}
  };

  // 초기 상태: 활성 항목이 그룹 안에 있으면 펼침 / 없으면 저장값 / 기본 접힘
  const hashActive = group.querySelector(`a[href="${decodeURIComponent(location.hash.replace(/^#/, ''))}"]`);
  let saved = null;
  try { saved = localStorage.getItem('digix.rental-group'); } catch {}
  const initial = hashActive ? true : (saved === '1');
  apply(initial);

  btn.addEventListener('click', () => apply(group.classList.contains('collapsed')));
}

bindSidebarLinks();
bindGroupToggle();
restoreFromHash();

/** 정기방문 D-임박(알림일 이내 + 지남) 건수를 사이드바 배지로 표시 */
async function updateVisitBadge() {
  try {
    const sb = window.totalasAuth; if (!sb) return;
    const { data } = await sb.from('rental_visit_schedules')
      .select('next_visit_date,alert_days,active').eq('active', true);
    if (!data) return;
    const t = new Date(); t.setHours(0,0,0,0);
    let n = 0;
    data.forEach(r => {
      const d = Math.round((new Date(r.next_visit_date + 'T00:00:00') - t) / 86400000);
      if (d <= (r.alert_days ?? 3)) n++;
    });
    const b = document.getElementById('vs-badge');
    if (b) { if (n > 0) { b.textContent = n; b.style.display = 'inline-block'; } else b.style.display = 'none'; }
  } catch (e) {}
}
document.addEventListener('totalas:ready', updateVisitBadge, { once: false });
if (window.currentUser) updateVisitBadge();

// ── 공지사항 (종합관리툴) ──
(function(){
  var ntData=[], ntSb=function(){return window.totalasAuth;};
  function ntEsc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);});}
  async function loadNt2(){
    var sb=ntSb(); if(!sb) return;
    var isAdmin=(typeof window.currentIsAdmin==='function')?await window.currentIsAdmin():false;
    var r=await sb.from('board_posts').select('id,title,content,created_at').eq('pinned',true).order('created_at',{ascending:false}).limit(10);
    ntData=r.data||[];
    var ul=document.getElementById('nt2-list'); if(!ul) return;
    if(r.error||!ntData.length){ul.innerHTML='<li class="nt2-empty">'+(r.error?'공지를 불러오지 못했습니다.':'등록된 공지가 없습니다.')+'</li>';return;}
    ul.innerHTML=ntData.map(function(p){return '<li data-ntid="'+p.id+'"><span class="nt2-tag">공지</span><span class="nt2-item-title">'+ntEsc(p.title)+'</span><span class="nt2-item-date">'+(p.created_at||'').slice(0,10)+'</span>'+(isAdmin?'<span class="nt2-del" data-ntdel="'+p.id+'" title="삭제">✕</span>':'')+'</li>';}).join('');
    ul.querySelectorAll('li[data-ntid]').forEach(function(li){
      li.addEventListener('click',function(e){
        if(e.target.classList.contains('nt2-del')) return;
        var post=ntData.find(function(x){return x.id===li.dataset.ntid;});
        if(post) openNt2View(post,li);
      });
    });
    ul.querySelectorAll('[data-ntdel]').forEach(function(s){
      s.addEventListener('click',async function(e){
        e.stopPropagation();
        if(!confirm('이 공지를 삭제할까요?')) return;
        await ntSb().from('board_posts').delete().eq('id',s.dataset.ntdel);
        closeNt2View(); await loadNt2();
      });
    });
    if(isAdmin){
      var adminEl=document.getElementById('nt2-admin');
      if(adminEl&&!adminEl.querySelector('button')){
        adminEl.innerHTML='<button class="nt2-btn" id="nt2-write">+ 공지쓰기</button>';
        document.getElementById('nt2-write').addEventListener('click',openNt2Modal);
      }
    }
  }
  function openNt2View(post,liEl){
    var body=(post.content||'').trim();
    if(/^https?:\/\//i.test(body)){window.open(body,'_blank','noopener');return;}
    document.querySelectorAll('#nt2-list li').forEach(function(l){l.classList.remove('nt2-active');});
    if(liEl) liEl.classList.add('nt2-active');
    document.getElementById('nt2-view-title').textContent=post.title;
    document.getElementById('nt2-view-meta').textContent=(post.created_at||'').slice(0,10);
    document.getElementById('nt2-view-body').textContent=body;
    document.getElementById('nt2-view').classList.add('show');
  }
  function closeNt2View(){
    var v=document.getElementById('nt2-view'); if(v) v.classList.remove('show');
    document.querySelectorAll('#nt2-list li').forEach(function(l){l.classList.remove('nt2-active');});
  }
  var cb=document.getElementById('nt2-view-close'); if(cb) cb.addEventListener('click',closeNt2View);
  function openNt2Modal(){
    var m=document.getElementById('nt2-modal');
    if(!m){
      var d=document.createElement('div');
      d.innerHTML='<div id="nt2-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;align-items:center;justify-content:center;z-index:1200"><div style="background:#fff;width:520px;max-width:94vw;border-radius:6px;overflow:hidden"><div style="background:#1e2939;color:#fff;padding:9px 13px;font-weight:bold;font-size:14px;display:flex;justify-content:space-between;align-items:center"><span>공지 등록</span><button id="nt2-mx" style="background:none;border:none;color:#fff;font-size:17px;cursor:pointer">×</button></div><div style="padding:14px"><label style="display:block;font-size:12px;font-weight:600;margin:0 0 4px;color:#374151">제목 *</label><input id="nt2-t" type="text" placeholder="예: 2026-07 업데이트 안내" style="width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ccc;border-radius:3px;font-size:13px;margin-bottom:10px;font-family:inherit"><label style="display:block;font-size:12px;font-weight:600;margin:0 0 4px;color:#374151">내용 또는 링크</label><textarea id="nt2-c" placeholder="내용을 입력하세요.&#10;링크만 넣으면 클릭 시 새 창으로 열립니다." style="width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ccc;border-radius:3px;font-size:13px;min-height:110px;resize:vertical;font-family:inherit;margin-bottom:4px"></textarea><div id="nt2-msg" style="font-size:12px;color:#c0392b;min-height:15px"></div></div><div style="padding:10px 13px;border-top:1px solid #eee;text-align:right"><button id="nt2-cancel" style="padding:6px 14px;font-size:13px;cursor:pointer;margin-right:6px">취소</button><button id="nt2-save" style="padding:6px 14px;font-size:13px;cursor:pointer;background:#1e2939;color:#fff;border:1px solid #1e2939;border-radius:3px">등록</button></div></div></div>';
      document.body.appendChild(d.firstElementChild);
      m=document.getElementById('nt2-modal');
      function close(){m.style.display='none';}
      document.getElementById('nt2-mx').addEventListener('click',close);
      document.getElementById('nt2-cancel').addEventListener('click',close);
      m.addEventListener('click',function(e){if(e.target===m) close();});
      document.getElementById('nt2-save').addEventListener('click',async function(){
        var t=document.getElementById('nt2-t').value.trim(),c=document.getElementById('nt2-c').value.trim(),msg=document.getElementById('nt2-msg');
        if(!t){msg.textContent='제목을 입력하세요.';return;}
        var btn=document.getElementById('nt2-save'); btn.disabled=true; msg.textContent='등록 중…';
        var res=await ntSb().from('board_posts').insert({title:t,content:c,author:localStorage.getItem('current_user')||'관리자',pinned:true});
        btn.disabled=false;
        if(res.error){msg.textContent='등록 실패: '+res.error.message;return;}
        close(); await loadNt2();
      });
    }
    document.getElementById('nt2-t').value=''; document.getElementById('nt2-c').value=''; document.getElementById('nt2-msg').textContent='';
    m.style.display='flex'; setTimeout(function(){document.getElementById('nt2-t').focus();},50);
  }
  document.addEventListener('totalas:ready',function(){loadNt2();},{once:false});
  setTimeout(function(){if(ntSb()) loadNt2();},2000);
})();
</script>

</body>
