<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>가격표 — 디직스코리아</title>
<script>
  // standalone URL 진입 시 → asms.html shell 안 iframe 으로 redirect.
  // shell 의 햄버거 / 사이드바 / 인증을 그대로 사용. ?standalone=1 우회.
  if (window === window.top && !new URLSearchParams(location.search).has('standalone')) {
    location.replace('../asms.html#prices/index.html');
  }
</script>
<link rel="stylesheet" href="../styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js?v=20260611"></script>
<script src="../auth.js"></script>
<style>
  .prices-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 14px;
    margin-top: 14px;
    min-height: calc(100vh - 200px);
  }
  .prices-list {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    box-shadow: var(--shadow);
    overflow: auto;
    max-height: calc(100vh - 200px);
  }
  .prices-list .group-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    padding: 8px 8px 4px;
  }

  /* row 컨테이너 — 우상단 액션 버튼 자리 확보 */
  .row-item { position: relative; margin: 2px 0; }
  .row-item .row-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 3px;
    opacity: 0;
    transition: opacity .12s;
  }
  .row-item:hover .row-actions,
  .row-item.editing .row-actions { opacity: 1; }
  .row-item .row-actions button {
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11.5px;
    cursor: pointer;
    line-height: 1;
    color: var(--muted);
  }
  .row-item .row-actions button:hover { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
  .row-item .row-actions button.delete:hover { background: #fee2e2; color: var(--danger); border-color: var(--danger); }
  .row-item.editing .row-actions .edit { background: var(--primary); color: #fff; border-color: var(--primary); }
  .row-item .row-btn { padding-right: 96px; }   /* 핸들 + 액션 버튼 자리 */

  /* 드래그 정렬 */
  .row-item .row-actions .drag-handle {
    cursor: grab;
    font-weight: bold;
    letter-spacing: -2px;
    padding: 2px 5px;
    user-select: none;
  }
  .row-item .row-actions .drag-handle:active { cursor: grabbing; background: var(--primary-soft); }
  .row-item.dragging { opacity: .45; }
  .row-item.drag-over-top    { box-shadow: inset 0 2px 0 var(--primary); }
  .row-item.drag-over-bottom { box-shadow: inset 0 -2px 0 var(--primary); }

  /* 인라인 편집 패널 — 해당 row 만 editing 클래스로 노출 */
  .row-edit-panel {
    margin: 4px 4px 8px 4px;
    padding: 8px 10px;
    background: #fffdf7;
    border: 1px dashed #f59e0b;
    border-radius: 6px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .row-item.editing .row-edit-panel { display: flex; }
  .row-edit-panel .field {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .row-edit-panel .field > span {
    width: 44px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--muted);
  }
  .row-edit-panel .field input[type=text],
  .row-edit-panel .field select {
    flex: 1;
    min-width: 0;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font: inherit;
    font-size: 12px;
    background: #fff;
  }
  .row-edit-panel .replace-row {
    display: flex;
    gap: 6px;
  }
  .row-edit-panel .replace-row button {
    flex: 1;
    padding: 5px 6px;
    font-size: 11.5px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: #fff;
    cursor: pointer;
    font: inherit;
  }
  .row-edit-panel .replace-row button:hover { background: var(--primary-soft); border-color: var(--primary); }
  .row-edit-panel .saved-mark {
    font-size: 10.5px;
    color: var(--success, #16a34a);
    text-align: right;
    height: 14px;
    transition: opacity .3s;
  }

  /* 토스트 — 파일 교체 등 부드러운 알림 */
  .price-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 23, 42, .92);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 2000;
    max-width: 90vw;
    box-shadow: 0 4px 12px rgba(0,0,0,.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .price-toast.show { opacity: 1; }
  .price-toast.err { background: #b91c1c; }
  .price-toast.ok  { background: #166534; }
  .prices-list .row-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 10px 12px;
    margin: 2px 0;
    cursor: pointer;
    font: inherit;
    color: var(--text);
    transition: background .12s, border-color .12s;
  }
  .prices-list .row-btn:hover { background: var(--primary-soft); }
  .prices-list .row-btn.active {
    background: var(--primary-soft);
    border-color: var(--primary);
    color: var(--primary-hover);
    font-weight: 600;
  }
  .prices-list .row-btn .meta {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }
  .prices-list .row-btn .ext {
    float: right;
    font-size: 10px;
    background: var(--bg);
    color: var(--muted);
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }
  .prices-list .empty-hint {
    padding: 14px;
    text-align: center;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.6;
  }

  .prices-viewer {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .prices-viewer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: #fafbfc;
  }
  .prices-viewer-head h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
  }
  .prices-viewer-head .meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .prices-viewer-head .head-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  /* page-head 우측 추가 버튼 자리 */
  .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  /* 추가 모달 */
  .pm-modal {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .pm-modal[hidden] { display: none; }
  .pm-backdrop {
    position: absolute; inset: 0;
    background: rgba(15, 23, 42, .55);
  }
  .pm-card {
    position: relative;
    background: #fff;
    border-radius: 10px;
    padding: 18px;
    width: min(440px, 92vw);
    max-height: 90vh;
    overflow: auto;
    box-shadow: var(--shadow-md);
  }
  .pm-card h3 { margin: 0 0 12px 0; font-size: 16px; }
  .pm-field { display: block; margin-bottom: 10px; font-size: 13px; }
  .pm-field span { display: block; margin-bottom: 3px; color: var(--text-soft); }
  .pm-field input[type=text],
  .pm-field input[type=file] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font: inherit;
    background: #fff;
  }
  .pm-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 12px;
  }
  .pm-status {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
  }
  .pm-status.err { color: var(--danger); }
  .pm-status.ok  { color: var(--success); }

  @media (max-width: 880px) {
    .prices-layout {
      grid-template-columns: 1fr;
      min-height: auto;
    }
    .prices-list { max-height: none; }
  }

  /* ============ 검색 기반 우측 영역 ============ */
  .search-toolbar {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: #fff;
  }
  .search-toolbar input[type=text] {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font: inherit;
  }
  .search-toolbar select {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
    font: inherit;
  }
  .search-toolbar button {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .search-toolbar button:hover { background: var(--primary-soft); border-color: var(--primary); }

  .results-summary {
    padding: 8px 14px;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: #fafbfc;
  }

  .results-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    align-content: start;
    max-height: calc(100vh - 320px);
  }
  .result-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    background: #fff;
    transition: box-shadow .12s, border-color .12s;
  }
  .result-card:hover {
    border-color: var(--primary);
    box-shadow: 0 2px 6px rgba(37, 99, 235, .08);
  }
  .result-card .badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .result-card .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    background: var(--primary-soft);
    color: var(--primary-hover);
  }
  .result-card .badge.cat-부품   { background: #f1f5f9; color: #475569; }
  .result-card .badge.cat-토너   { background: #fef3c7; color: #92400e; }
  .result-card .badge.cat-드럼   { background: #dbeafe; color: #1e40af; }
  .result-card .badge.cat-NAS    { background: #dcfce7; color: #166534; }
  .result-card .badge.cat-라이선스 { background: #ede9fe; color: #5b21b6; }
  .result-card .badge.cat-저장소 { background: #cffafe; color: #155e75; }
  .result-card .badge.cat-IP카메라 { background: #ffe4e6; color: #9f1239; }
  .result-card .badge.cat-메모리 { background: #fce7f3; color: #9d174d; }
  .result-card .badge.cat-네트워크 { background: #ecfeff; color: #155e75; }
  .result-card .badge.cat-보증   { background: #fee2e2; color: #991b1b; }
  .result-card .badge.cat-기타   { background: #f3f4f6; color: #4b5563; }

  .result-card .name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    word-break: break-word;
  }
  .result-card .meta-line {
    font-size: 11.5px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .result-card .meta-line b { color: var(--text-soft); font-weight: 500; }
  .result-card .prices {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 3px 10px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    font-size: 12.5px;
  }
  .result-card .prices .label { color: var(--muted); align-self: center; }
  .result-card .prices .val   { font-weight: 700; color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }
  .result-card .prices .val.overridden {
    color: #ea580c;
  }
  .result-card .prices .val.overridden::after {
    content: ' ✎';
    font-size: 10px;
    opacity: .8;
  }
  .result-card .prices .val-edit {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: flex-end;
  }
  .result-card .prices .val-edit input {
    width: 90px;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font: inherit;
    font-size: 12.5px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .result-card .prices .val-edit input.overridden {
    border-color: #ea580c;
    background: #fff7ed;
  }
  .result-card .prices .val-edit .reset-btn {
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    padding: 1px 5px;
    font-size: 11px;
    cursor: pointer;
    color: var(--muted);
  }
  .result-card .prices .val-edit .reset-btn:hover { background: var(--primary-soft); color: var(--primary); }
  .result-card.editing { border-color: #f59e0b; background: #fffdf7; }
  .result-card .source {
    margin-top: 8px;
    font-size: 10.5px;
    color: var(--muted);
    word-break: break-all;
  }

  .results-empty, .results-error {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    grid-column: 1 / -1;
  }
  .results-more {
    grid-column: 1 / -1;
    padding: 10px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px dashed var(--border);
  }

  /* ── 검색어 하이라이트 ── */
  .result-card mark {
    background: #fde68a;
    color: inherit;
    padding: 0 2px;
    border-radius: 2px;
  }

  @media (max-width: 880px) {
    .search-toolbar { grid-template-columns: 1fr 1fr; }
    .search-toolbar input[type=text] { grid-column: 1 / -1; }
    .results-list { grid-template-columns: 1fr; max-height: none; }
  }
</style>
</head>
<body>
<main class="container">
  <div class="page-head">
    <div>
      <h1>💵 가격표</h1>
      <p class="muted" style="margin:2px 0 0 0;">제조사 / 공급사별 단가표를 바로 열람합니다.</p>
    </div>
    <div>
      <button id="btn-add" class="btn primary" hidden>+ 가격표 추가</button>
    </div>
  </div>

  <div class="prices-layout">
    <aside class="prices-list" id="prices-list">
      <div class="group-title">단가표 목록</div>
      <div id="list-body"><div class="empty-hint">불러오는 중...</div></div>
    </aside>
    <section class="prices-viewer">
      <div class="prices-viewer-head">
        <div>
          <h2 id="current-name">가격표를 선택하세요</h2>
          <div class="meta" id="current-meta">좌측에서 단가표를 클릭하면 검색이 활성화됩니다.</div>
        </div>
        <div class="head-actions">
          <a id="open-new" class="btn ghost small" target="_blank" rel="noopener" style="display:none;">↗ 원본 새 창</a>
        </div>
      </div>
      <div class="search-toolbar">
        <input type="text" id="q" placeholder="🔍 품번 · 품명 · 모델 검색 (좌측에서 단가표 먼저 선택)" autocomplete="off" disabled>
        <select id="filter-category" disabled><option value="">카테고리 전체</option></select>
        <button id="btn-reset" type="button">초기화</button>
      </div>
      <div class="results-summary" id="results-summary">좌측에서 단가표를 클릭하세요.</div>
      <div class="results-list" id="results-list">
        <div class="results-empty">← 좌측에서 단가표를 선택하면 이 자리에 검색 결과가 표시됩니다.</div>
      </div>
    </section>
  </div>

  <div id="add-modal" class="pm-modal" hidden>
    <div class="pm-backdrop" id="add-backdrop"></div>
    <div class="pm-card">
      <h3>가격표 추가</h3>
      <label class="pm-field">
        <span>파일 (xlsx / xls / pdf / docx / pptx, 50MB 이하)</span>
        <input type="file" id="add-file" accept=".xlsx,.xls,.pdf,.docx,.doc,.pptx,.ppt">
      </label>
      <label class="pm-field">
        <span>표시명 *</span>
        <input type="text" id="add-label" placeholder="예: 교세라 부품 가격표">
      </label>
      <label class="pm-field">
        <span>부가 설명 (선택)</span>
        <input type="text" id="add-meta" placeholder="예: 2026.01 / 인상">
      </label>
      <div class="pm-actions">
        <button id="add-cancel" class="btn ghost">취소</button>
        <button id="add-submit" class="btn primary">업로드</button>
      </div>
      <div id="add-status" class="pm-status"></div>
    </div>
  </div>

  <div id="price-toast" class="price-toast"></div>
</main>

<script>
const listBody = document.getElementById('list-body');
const nameEl   = document.getElementById('current-name');
const metaEl   = document.getElementById('current-meta');
const openNew  = document.getElementById('open-new');
const btnAdd   = document.getElementById('btn-add');

let ROWS    = [];
let CURRENT = null;

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// file_path 가 절대 URL 이면 그대로 / 아니면 Storage public URL
function fileUrl(row) {
  if (/^https?:\/\//.test(row.file_path)) return row.file_path;
  const sb = window.totalasAuth;
  return sb.storage.from('prices').getPublicUrl(row.file_path).data.publicUrl;
}

function renderList() {
  listBody.innerHTML = '';
  if (!ROWS.length) {
    listBody.innerHTML = `
      <div class="empty-hint">
        등록된 가격표가 없습니다.<br>
        ${btnAdd.hidden ? '(추가 권한이 있는 계정으로 로그인하세요)' : '우상단 <b>+ 가격표 추가</b> 버튼을 눌러 등록하세요.'}
      </div>`;
    return;
  }
  const canEdit = !btnAdd.hidden;   // 인증 사용자 여부
  ROWS.forEach(row => {
    const isActive  = CURRENT && CURRENT.id === row.id;
    const isEditing = EDIT_ROW_ID === row.id;
    const item = document.createElement('div');
    item.className = 'row-item' + (isEditing ? ' editing' : '');
    item.dataset.id = row.id;
    item.innerHTML = `
      <button type="button" class="row-btn${isActive ? ' active' : ''}" data-id="${row.id}">
        <span class="ext">${esc((row.ext || '').toUpperCase())}</span>
        ${esc(row.label)}
        <span class="meta">${esc(row.meta || '')}</span>
      </button>
      ${canEdit ? `<div class="row-actions">
        <button type="button" class="drag-handle" title="드래그로 순서 변경">⋮⋮</button>
        <button type="button" class="edit" data-action="edit" title="수정">${isEditing ? '✓' : '✏️'}</button>
        <button type="button" class="delete" data-action="delete" title="삭제">🗑</button>
      </div>` : ''}
      <div class="row-edit-panel">
        <div class="field">
          <span>표시명</span>
          <input type="text" data-field="label" value="${esc(row.label)}">
        </div>
        <div class="field">
          <span>메모</span>
          <input type="text" data-field="meta" value="${esc(row.meta || '')}" placeholder="예: 2026.01 인상">
        </div>
        <div class="field">
          <span>공급처</span>
          <select data-field="supplier_key">
            <option value="">자동 추론${(() => { const a = rowToSupplierAuto(row); return a ? ` — ${a}` : ' — 매핑 실패'; })()}</option>
            ${supplierOptions().map(s => `<option value="${esc(s)}" ${SUPPLIER_MAP[row.id] === s ? 'selected' : ''}>${esc(s)}</option>`).join('')}
          </select>
        </div>
        <div class="replace-row">
          <button type="button" data-action="replace">📄 원본 파일 교체</button>
        </div>
        <div class="saved-mark" style="opacity:0;">저장됨</div>
      </div>
    `;
    listBody.appendChild(item);
  });
}

function select(id) {
  const row = ROWS.find(r => r.id === id);
  if (!row) return;
  CURRENT = row;

  // 다른 row 클릭 → 편집 모드 자동 해제
  if (EDIT_ROW_ID !== null && EDIT_ROW_ID !== id) {
    EDIT_ROW_ID = null;
  }

  // 좌측 DOM 갱신 (active + editing + ✏️/✓ 아이콘) — input focus 보존
  document.querySelectorAll('#list-body .row-item').forEach(el => {
    const itemId = Number(el.dataset.id);
    el.classList.toggle('editing', EDIT_ROW_ID !== null && itemId === EDIT_ROW_ID);
    const editBtn = el.querySelector('.row-actions .edit');
    if (editBtn) editBtn.textContent = (itemId === EDIT_ROW_ID) ? '✓' : '✏️';
    const rowBtn = el.querySelector('.row-btn');
    if (rowBtn) rowBtn.classList.toggle('active', itemId === id);
  });

  // 우측 헤더 갱신
  nameEl.textContent = row.label;
  openNew.href = fileUrl(row);
  openNew.style.display = '';

  // 이 가격표의 supplier 락 (검색은 이 supplier 내에서만)
  SELECTED_SUPPLIER = rowToSupplier(row);
  if (!SELECTED_SUPPLIER) {
    metaEl.textContent = '⚠ 이 가격표는 catalog 인덱싱이 없습니다 — build-catalog.bat 실행 필요';
    qInput.disabled = true;
    filCat.disabled = true;
    sumEl.textContent = '인덱싱 정보 없음';
    listEl2.innerHTML = `<div class="results-empty">이 단가표는 <code>catalog.json</code> 에 인덱싱되지 않았습니다.<br>
      <code>prices/build-catalog.bat</code> 실행 후 새로고침하세요.</div>`;
    return;
  }
  metaEl.textContent = `${SELECTED_SUPPLIER} · 갱신: ${CATALOG.generated_at || '—'}`;
  qInput.disabled = false;
  filCat.disabled = false;
  qInput.placeholder = `🔍 ${SELECTED_SUPPLIER} 내에서 품번 · 품명 · 모델 검색`;
  qInput.value = '';
  filCat.value = '';
  buildCategoryFilter();
  runSearch();
}

async function loadList() {
  const sb = window.totalasAuth;
  const { data, error } = await sb
    .from('prices_index')
    .select('*')
    .order('sort_order', { ascending: true })
    .order('created_at', { ascending: false });
  if (error) {
    listBody.innerHTML = `<div class="empty-hint">불러오기 실패: ${esc(error.message)}</div>`;
    return;
  }
  ROWS = data || [];
  renderList();
  // 자동 선택 안 함 — 사용자가 좌측 클릭으로 supplier 선택
}

const modal    = document.getElementById('add-modal');
const fInput   = document.getElementById('add-file');
const lInput   = document.getElementById('add-label');
const mInput   = document.getElementById('add-meta');
const statusEl = document.getElementById('add-status');

function openModal() {
  fInput.value = '';
  lInput.value = '';
  mInput.value = '';
  statusEl.textContent = '';
  statusEl.className = 'pm-status';
  modal.hidden = false;
}
function closeModal() { modal.hidden = true; }

btnAdd.addEventListener('click', openModal);
document.getElementById('add-cancel').addEventListener('click', closeModal);
document.getElementById('add-backdrop').addEventListener('click', closeModal);

// 파일 선택 시 표시명 자동 채움 (비어있을 때만)
fInput.addEventListener('change', () => {
  if (!lInput.value && fInput.files[0]) {
    lInput.value = fInput.files[0].name.replace(/\.[^.]+$/, '');
  }
});

function setStatus(text, kind) {
  statusEl.textContent = text;
  statusEl.className = 'pm-status' + (kind ? ' ' + kind : '');
}

document.getElementById('add-submit').addEventListener('click', async () => {
  const file  = fInput.files[0];
  const label = lInput.value.trim();
  const meta  = mInput.value.trim();
  if (!file)  return setStatus('파일을 선택하세요.', 'err');
  if (!label) return setStatus('표시명을 입력하세요.', 'err');
  if (file.size > 50 * 1024 * 1024) return setStatus('파일이 50MB 를 초과합니다.', 'err');

  setStatus('업로드 중...');

  const sb = window.totalasAuth;
  const ts = Date.now();
  const rand = Math.random().toString(36).slice(2, 10);
  const ext  = (file.name.match(/\.([^.]+)$/) || [, ''])[1].toLowerCase();
  const path = `${ts}_${rand}${ext ? '.' + ext : ''}`;

  // 1) Storage 업로드
  const up = await sb.storage.from('prices').upload(path, file, {
    cacheControl: '3600',
    upsert: false,
    contentType: file.type || undefined,
  });
  if (up.error) return setStatus('Storage 업로드 실패: ' + up.error.message, 'err');

  // 2) DB insert
  const ins = await sb.from('prices_index').insert({
    label, meta: meta || null,
    file_path: path, ext,
    sort_order: (ROWS[ROWS.length - 1]?.sort_order || 0) + 1,
    created_by: window.currentUser?.id || null,
  }).select().single();

  if (ins.error) {
    // 롤백
    await sb.storage.from('prices').remove([path]);
    return setStatus('DB 등록 실패: ' + ins.error.message, 'err');
  }

  setStatus('완료', 'ok');
  await loadList();
  select(ins.data.id);
  setTimeout(closeModal, 400);
});

let SELECTED_SUPPLIER = '';
const RESULT_LIMIT = 100;

// ─── 제품별 가격 오버라이드 — localStorage (item.id 기준) ───
// catalog 의 cost / consumer_price 대신 강제로 사용할 가격. dealer/consumer 각각 설정 가능.
const OVERRIDE_KEY = 'prices_overrides_v1';
function loadOverrides() {
  try { return JSON.parse(localStorage.getItem(OVERRIDE_KEY) || '{}'); }
  catch { return {}; }
}
let OVERRIDES = loadOverrides();
function overrideFor(itemId) { return OVERRIDES[itemId] || {}; }
function saveOverrides() { localStorage.setItem(OVERRIDE_KEY, JSON.stringify(OVERRIDES)); }
function setOverride(itemId, key, value) {
  const num = Number(value);
  if (value === '' || !Number.isFinite(num) || num < 0) return;
  if (!OVERRIDES[itemId]) OVERRIDES[itemId] = {};
  OVERRIDES[itemId][key] = num;
  saveOverrides();
}
function clearOverride(itemId, key) {
  if (!OVERRIDES[itemId]) return;
  delete OVERRIDES[itemId][key];
  if (!Object.keys(OVERRIDES[itemId]).length) delete OVERRIDES[itemId];
  saveOverrides();
}
// ─── 좌측 row → catalog supplier 매핑 ─────────────────────
// 우선순위: (1) 사용자가 명시 지정한 매핑 (2) 표시명/메타 키워드 자동 추론
const SUPPLIER_MAP_KEY = 'prices_supplier_map_v1';
let SUPPLIER_MAP = (() => {
  try { return JSON.parse(localStorage.getItem(SUPPLIER_MAP_KEY) || '{}'); }
  catch { return {}; }
})();
function setSupplierMap(rowId, supplier) {
  if (supplier) SUPPLIER_MAP[rowId] = supplier;
  else delete SUPPLIER_MAP[rowId];
  localStorage.setItem(SUPPLIER_MAP_KEY, JSON.stringify(SUPPLIER_MAP));
}

function rowToSupplierAuto(row) {
  // 명시적 브랜드명 키워드만 사용. '재생토너' 같은 일반어는 모호해서 제외.
  // 매핑이 모호하면 사용자가 수정 모드 → 공급처 드롭다운에서 직접 선택.
  const lbl = ((row?.label || '') + ' ' + (row?.meta || '')).toLowerCase();
  if (lbl.includes('교세라') && (lbl.includes('kg') || lbl.includes('케이지') || lbl.includes('하이테크'))) return 'KG하이테크';
  if (lbl.includes('교세라')) return '교세라(본사)';
  if (lbl.includes('위더스')) return '위더스(재생토너)';
  if (lbl.includes('에스와이') || lbl.includes('토너이미지')) return '에스와이(토너이미지)';
  if (lbl.includes('시놀로지') || lbl.includes('synology')) return '시놀로지(공식)';
  return '';
}
function rowToSupplier(row) {
  if (!row) return '';
  return SUPPLIER_MAP[row.id] || rowToSupplierAuto(row);
}
function supplierOptions() {
  return Object.keys(CATALOG.by_supplier || {}).sort();
}

async function loadCatalog() {
  try {
    const res = await fetch('catalog.json?ts=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    CATALOG = await res.json();
  } catch (e) {
    console.error('[catalog] 로드 실패:', e);
    sumEl.textContent = '카탈로그 로딩 실패';
    listEl2.innerHTML = `<div class="results-error">catalog.json 을 불러오지 못했습니다.<br>
      <code>prices/build-catalog.bat</code> 실행해 인덱스를 생성하세요.</div>`;
  }
}

function buildCategoryFilter() {
  const items = SELECTED_SUPPLIER
    ? CATALOG.items.filter(it => it.supplier === SELECTED_SUPPLIER) : [];
  const cnt = {};
  for (const it of items) cnt[it.category] = (cnt[it.category] || 0) + 1;
  const sorted = Object.keys(cnt).sort();
  filCat.innerHTML = '<option value="">카테고리 전체 (' + items.length.toLocaleString() + ')</option>'
    + sorted.map(c => `<option value="${esc(c)}">${esc(c)} (${cnt[c].toLocaleString()})</option>`).join('');
}

function runSearch() {
  if (!SELECTED_SUPPLIER) {
    sumEl.textContent = '좌측에서 단가표를 클릭하세요.';
    listEl2.innerHTML = `<div class="results-empty">← 좌측에서 단가표를 선택하면 이 자리에 검색 결과가 표시됩니다.</div>`;
    return;
  }
  const q = (qInput.value || '').trim().toLowerCase();
  const cat = filCat.value;
  let arr = (CATALOG.items || []).filter(it => it.supplier === SELECTED_SUPPLIER);
  if (cat) arr = arr.filter(it => it.category === cat);
  if (q) {
    const toks = q.split(/\s+/).filter(Boolean);
    arr = arr.filter(it => {
      const hay = [it.part_number, it.product_name, it.compatible_model,
                   it.part_type, it.specs, it.notes].filter(Boolean).join(' ').toLowerCase();
      return toks.every(t => hay.includes(t));
    });
  }
  renderResults(arr, q);
}

function renderResults(items, q) {
  const total = items.length;
  sumEl.textContent = total
    ? `결과 ${total.toLocaleString()}건` + (total > RESULT_LIMIT ? ` (상위 ${RESULT_LIMIT}건 표시)` : '')
    : '결과 없음';
  if (!total) {
    listEl2.innerHTML = `<div class="results-empty">검색 결과가 없습니다.<br>검색어/카테고리 필터를 조정해 보세요.</div>`;
    return;
  }
  const slice = items.slice(0, RESULT_LIMIT);
  listEl2.innerHTML = slice.map(it => cardHTML(it, q)).join('')
    + (total > RESULT_LIMIT ? `<div class="results-more">더 좁히려면 검색어 추가 / 카테고리 필터 사용</div>` : '');
}

function cardHTML(it, q) {
  const cat = it.category || '기타';
  const badges = `<div class="badges">
    <span class="badge cat-${esc(cat)}">${esc(cat)}</span>
    ${it.part_type && it.part_type !== cat ? `<span class="badge" style="background:#f1f5f9;color:#475569;">${esc(it.part_type)}</span>` : ''}
  </div>`;
  const name = highlight(it.product_name || it.part_number || '-', q);
  const meta = [
    it.part_number ? `<b>품번</b> ${highlight(it.part_number, q)}` : '',
    it.compatible_model ? `<b>호환</b> ${highlight(it.compatible_model, q)}` : '',
    it.specs ? `<b>사양</b> ${esc(it.specs)}` : '',
    it.notes ? esc(it.notes) : ''
  ].filter(Boolean).join(' · ');

  const cost = Number(it.cost) || 0;
  const srcConsumer = Number(it.consumer_price) || 0;
  const ovr  = overrideFor(it.id);
  // 원가 = catalog 의 cost 그대로. 소비자가격 = consumer_price (교세라 등 소스 명시) 또는 오버라이드.
  const calcDealer   = cost;
  const calcConsumer = srcConsumer;
  const effDealer    = ovr.dealer   != null ? ovr.dealer   : calcDealer;
  const effConsumer  = ovr.consumer != null ? ovr.consumer : calcConsumer;
  const hasConsumer  = effConsumer > 0;

  let priceHtml = '';
  if (isRightEditing()) {
    // 편집 모드 — 입력 가능
    const idEsc = esc(it.id);
    const ovDealer   = ovr.dealer   != null;
    const ovConsumer = ovr.consumer != null;
    priceHtml = `<div class="prices">
      <span class="label">원가 (VAT별도)</span>
      <span class="val-edit">
        <input type="number" data-price-edit="dealer" data-item-id="${idEsc}" value="${effDealer}" min="0" step="100" class="${ovDealer ? 'overridden' : ''}">
        <span style="font-size:11px;color:var(--muted);">원</span>
        ${ovDealer ? `<button type="button" class="reset-btn" data-price-reset="dealer" data-item-id="${idEsc}" title="원본값으로 복원 (${calcDealer.toLocaleString()}원)">↻</button>` : ''}
      </span>
      <span class="label">소비자가격 (VAT별도)</span>
      <span class="val-edit">
        <input type="number" data-price-edit="consumer" data-item-id="${idEsc}" value="${effConsumer}" min="0" step="100" class="${ovConsumer ? 'overridden' : ''}">
        <span style="font-size:11px;color:var(--muted);">원</span>
        ${ovConsumer ? `<button type="button" class="reset-btn" data-price-reset="consumer" data-item-id="${idEsc}" title="원본값으로 복원 (${calcConsumer.toLocaleString()}원)">↻</button>` : ''}
      </span>
    </div>`;
  } else if (cost > 0 || ovr.dealer != null || ovr.consumer != null) {
    const consumerRow = hasConsumer
      ? `<span class="label">소비자가격 (VAT별도)</span>
         <span class="val${ovr.consumer != null ? ' overridden' : ''}">${effConsumer.toLocaleString()}원</span>`
      : '';
    priceHtml = `<div class="prices">
      <span class="label">원가 (VAT별도)</span>
      <span class="val${ovr.dealer   != null ? ' overridden' : ''}">${effDealer.toLocaleString()}원</span>
      ${consumerRow}
    </div>`;
  } else {
    priceHtml = `<div class="prices"><span class="label" style="grid-column:1/-1;color:var(--danger);">원가 정보 없음</span></div>`;
  }

  const cardCls = 'result-card' + (isRightEditing() ? ' editing' : '');
  return `<div class="${cardCls}">
    ${badges}
    <div class="name">${name}</div>
    ${meta ? `<div class="meta-line">${meta}</div>` : ''}
    ${priceHtml}
  </div>`;
}

function highlight(text, q) {
  const t = esc(text || '');
  if (!q) return t;
  const toks = q.split(/\s+/).filter(t => t.length >= 1)
    .map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  if (!toks.length) return t;
  const re = new RegExp('(' + toks.join('|') + ')', 'gi');
  return t.replace(re, '<mark>$1</mark>');
}

// 토스트
const toastEl = document.getElementById('price-toast');
function toast(msg, kind, ms = 2200) {
  toastEl.textContent = msg;
  toastEl.className = 'price-toast show' + (kind ? ' ' + kind : '');
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(() => { toastEl.className = 'price-toast' + (kind ? ' ' + kind : ''); }, ms);
}

// ─── 드래그 정렬 ───────────────────────────────
// 핸들(⋮⋮) 에서만 드래그 시작. mousedown 시 동적으로 draggable=true 부여.
let _draggingId = null;
let _dragOverEl = null;

listBody.addEventListener('mousedown', (e) => {
  const h = e.target.closest('.drag-handle');
  if (!h) return;
  const item = h.closest('.row-item');
  if (item) item.setAttribute('draggable', 'true');
});
document.addEventListener('mouseup', () => {
  // 드래그 시작 안 하고 mouseup 한 경우 안전 정리
  if (_draggingId == null) {
    document.querySelectorAll('#list-body .row-item[draggable]').forEach(el => el.removeAttribute('draggable'));
  }
});

listBody.addEventListener('dragstart', (e) => {
  const item = e.target.closest('.row-item[draggable="true"]');
  if (!item) { e.preventDefault(); return; }
  _draggingId = Number(item.dataset.id);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(_draggingId));
  setTimeout(() => item.classList.add('dragging'), 0);  // 즉시 추가하면 드래그 고스트가 투명해짐
});

listBody.addEventListener('dragover', (e) => {
  if (_draggingId == null) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const target = e.target.closest('.row-item');
  if (!target || Number(target.dataset.id) === _draggingId) return;
  const rect = target.getBoundingClientRect();
  const after = (e.clientY - rect.top) > rect.height / 2;
  if (_dragOverEl && _dragOverEl !== target) {
    _dragOverEl.classList.remove('drag-over-top', 'drag-over-bottom');
  }
  target.classList.remove('drag-over-top', 'drag-over-bottom');
  target.classList.add(after ? 'drag-over-bottom' : 'drag-over-top');
  _dragOverEl = target;
});

listBody.addEventListener('drop', (e) => {
  if (_draggingId == null) return;
  e.preventDefault();
  const target = e.target.closest('.row-item');
  if (!target || Number(target.dataset.id) === _draggingId) return;
  const rect = target.getBoundingClientRect();
  const after = (e.clientY - rect.top) > rect.height / 2;
  const dragEl = document.querySelector(`#list-body .row-item[data-id="${_draggingId}"]`);
  if (!dragEl) return;
  if (after) target.parentNode.insertBefore(dragEl, target.nextSibling);
  else       target.parentNode.insertBefore(dragEl, target);
});

listBody.addEventListener('dragend', async () => {
  const wasDraggingId = _draggingId;
  _draggingId = null;
  document.querySelectorAll('#list-body .row-item[draggable]').forEach(el => el.removeAttribute('draggable'));
  document.querySelectorAll('#list-body .row-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
  });
  _dragOverEl = null;
  if (wasDraggingId == null) return;

  // DOM 순서대로 sort_order 재배정 (10, 20, 30 …)
  const ordered = Array.from(listBody.querySelectorAll('.row-item'))
    .map((el, i) => ({ id: Number(el.dataset.id), sort_order: (i + 1) * 10 }));

  const sb = window.totalasAuth;
  const updates = [];
  for (const u of ordered) {
    const r = ROWS.find(x => x.id === u.id);
    if (r && r.sort_order !== u.sort_order) {
      updates.push(sb.from('prices_index').update({ sort_order: u.sort_order }).eq('id', u.id));
      r.sort_order = u.sort_order;
    }
  }
  if (!updates.length) return;

  toast('순서 저장 중…');
  const results = await Promise.all(updates);
  const err = results.find(r => r.error);
  if (err) { toast('순서 저장 실패: ' + err.error.message, 'err'); return; }

  // 로컬 ROWS 도 재정렬
  ROWS.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
  toast('✓ 순서 저장됨', 'ok');
});

// ─── 우측 결과 카드 가격 오버라이드 (수정 모드일 때만) ───
listEl2.addEventListener('input', (e) => {
  const ip = e.target.closest('input[data-price-edit]');
  if (!ip) return;
  const itemId = ip.dataset.itemId;
  const key    = ip.dataset.priceEdit;
  setOverride(itemId, key, ip.value);
  ip.classList.add('overridden');
});
listEl2.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-price-reset]');
  if (!btn) return;
  const itemId = btn.dataset.itemId;
  const key    = btn.dataset.priceReset;
  clearOverride(itemId, key);
  runSearch();
});

// ─── 좌측 클릭 위임 — 액션 버튼(.edit/.delete/.replace) + 일반 행 선택 ───
listBody.addEventListener('click', async (e) => {
  const actBtn = e.target.closest('button[data-action]');
  if (actBtn) {
    e.stopPropagation();
    const rowEl = actBtn.closest('.row-item');
    if (!rowEl) return;
    const rowId = Number(rowEl.dataset.id);
    const row = ROWS.find(r => r.id === rowId);
    if (!row) return;
    const action = actBtn.dataset.action;

    if (action === 'edit') {
      if (EDIT_ROW_ID === rowId) {
        setEditingRow(null);              // 토글 — 편집 종료
      } else {
        if (!CURRENT || CURRENT.id !== rowId) select(rowId);
        setEditingRow(rowId);             // 그 row 만 편집 진입
      }
      return;
    }
    if (action === 'delete') {
      if (!confirm(`"${row.label}" 가격표를 삭제할까요?\n(원본 파일도 함께 삭제됩니다)`)) return;
      await deleteRow(row);
      return;
    }
    if (action === 'replace') {
      pickAndReplaceFile(row);
      return;
    }
  }

  // 일반 행 클릭 (액션 버튼 외) → 선택만
  const rowBtn = e.target.closest('.row-btn');
  if (rowBtn) {
    const rowId = Number(rowBtn.dataset.id);
    select(rowId);
  }
});

// ─── 표시명·메타·마진 입력 ───
const _saveTimers = new Map();
listBody.addEventListener('input', (e) => {
  const ip = e.target;
  const rowEl = ip.closest('.row-item');
  if (!rowEl) return;
  const rowId = Number(rowEl.dataset.id);
  const flashSaved = () => {
    const mark = rowEl.querySelector('.saved-mark');
    if (!mark) return;
    mark.style.opacity = '1';
    clearTimeout(mark._t);
    mark._t = setTimeout(() => { mark.style.opacity = '0'; }, 1000);
  };

  if (ip.matches('input[data-field]')) {
    const field = ip.dataset.field;
    const value = ip.value;
    const key = `${rowId}-${field}`;
    clearTimeout(_saveTimers.get(key));
    _saveTimers.set(key, setTimeout(async () => {
      const sb = window.totalasAuth;
      const patch = { [field]: value || null };
      const { error } = await sb.from('prices_index').update(patch).eq('id', rowId);
      if (error) { toast('저장 실패: ' + error.message, 'err'); return; }
      const r = ROWS.find(x => x.id === rowId);
      if (r) r[field] = value;
      // 좌측 row-btn 의 label/meta 텍스트 노드 갱신 (재렌더 없이)
      const rowBtn = rowEl.querySelector('.row-btn');
      if (rowBtn) {
        const extHtml = `<span class="ext">${esc((r?.ext || '').toUpperCase())}</span>`;
        const labelTxt = esc(field === 'label' ? value : (r?.label || ''));
        const metaTxt  = esc(field === 'meta'  ? value : (r?.meta  || ''));
        rowBtn.innerHTML = `${extHtml}${labelTxt}<span class="meta">${metaTxt}</span>`;
      }
      // 우측 헤더 동기화
      if (CURRENT && CURRENT.id === rowId && field === 'label') {
        nameEl.textContent = value;
      }
      flashSaved();
    }, 600));
    return;
  }
  if (ip.matches('select[data-field="supplier_key"]')) {
    setSupplierMap(rowId, ip.value);
    // 우측이 이 row 면 supplier 락 재계산 + 재검색
    if (CURRENT && CURRENT.id === rowId) {
      SELECTED_SUPPLIER = rowToSupplier(CURRENT);
      if (!SELECTED_SUPPLIER) {
        metaEl.textContent = '⚠ 공급처 매핑 없음 — 위에서 직접 선택하세요';
        qInput.disabled = true; filCat.disabled = true;
        sumEl.textContent = '인덱싱 정보 없음';
        listEl2.innerHTML = `<div class="results-empty">공급처가 매핑되지 않았습니다.<br>수정 모드의 <b>공급처</b> 드롭다운에서 직접 선택하세요.</div>`;
      } else {
        metaEl.textContent = `${SELECTED_SUPPLIER} · 갱신: ${CATALOG.generated_at || '—'}`;
        qInput.disabled = false; filCat.disabled = false;
        qInput.placeholder = `🔍 ${SELECTED_SUPPLIER} 내에서 품번 · 품명 · 모델 검색`;
        buildCategoryFilter();
        runSearch();
      }
    }
    flashSaved();
    return;
  }
});

// ─── 파일 교체 / 삭제 ───
function pickAndReplaceFile(row) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx,.xls,.pdf,.docx,.doc,.pptx,.ppt';
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.addEventListener('change', async () => {
    const file = inp.files[0];
    inp.remove();
    if (!file) return;
    await replaceFile(row, file);
  });
  inp.click();
}

async function replaceFile(row, file) {
  if (file.size > 50 * 1024 * 1024) { toast('파일이 50MB 를 초과합니다.', 'err'); return; }
  toast('업로드 중…');
  const sb = window.totalasAuth;
  const ts = Date.now();
  const rand = Math.random().toString(36).slice(2, 10);
  const ext = (file.name.match(/\.([^.]+)$/) || [, ''])[1].toLowerCase();
  const newPath = `${ts}_${rand}${ext ? '.' + ext : ''}`;

  const up = await sb.storage.from('prices').upload(newPath, file, {
    cacheControl: '3600', upsert: false, contentType: file.type || undefined,
  });
  if (up.error) { toast('업로드 실패: ' + up.error.message, 'err'); return; }

  const upd = await sb.from('prices_index').update({ file_path: newPath, ext }).eq('id', row.id);
  if (upd.error) {
    await sb.storage.from('prices').remove([newPath]).catch(()=>{});
    toast('DB 갱신 실패: ' + upd.error.message, 'err');
    return;
  }
  if (!/^https?:\/\//.test(row.file_path)) {
    await sb.storage.from('prices').remove([row.file_path]).catch(()=>{});
  }
  await loadList();
  // ↗ 원본 새 창 링크 갱신
  if (CURRENT && CURRENT.id === row.id) {
    const fresh = ROWS.find(r => r.id === row.id);
    if (fresh) openNew.href = fileUrl(fresh);
  }
  toast('✅ 파일 교체 완료 · 검색은 기존 인덱스 유지', 'ok');
}

async function deleteRow(row) {
  const sb = window.totalasAuth;
  if (!/^https?:\/\//.test(row.file_path)) {
    const r = await sb.storage.from('prices').remove([row.file_path]);
    if (r.error) { toast('파일 삭제 실패: ' + r.error.message, 'err'); return; }
  }
  const { error } = await sb.from('prices_index').delete().eq('id', row.id);
  if (error) { toast('DB 삭제 실패: ' + error.message, 'err'); return; }
  if (CURRENT && CURRENT.id === row.id) {
    CURRENT = null;
    SELECTED_SUPPLIER = '';
    nameEl.textContent = '가격표를 선택하세요';
    metaEl.textContent = '좌측에서 단가표를 클릭하면 검색이 활성화됩니다.';
    openNew.style.display = 'none';
    qInput.disabled = true;
    filCat.disabled = true;
    sumEl.textContent = '좌측에서 단가표를 클릭하세요.';
    listEl2.innerHTML = `<div class="results-empty">← 좌측에서 단가표를 선택하면 이 자리에 검색 결과가 표시됩니다.</div>`;
  }
  if (EDIT_ROW_ID === row.id) EDIT_ROW_ID = null;
  await loadList();
  toast('🗑 삭제 완료', 'ok');
}

// ---------- 부팅 ----------
async function boot() {
  if (window.currentUser) {
    btnAdd.hidden = false;
  }
  // catalog 먼저 (가격 계산용) → 그 다음 파일 목록
  await loadCatalog();
  await loadList();
}
if (window.currentUser) {
  boot();
} else {
  document.addEventListener('totalas:ready', boot, { once: true });
  setTimeout(() => { if (!ROWS.length) boot(); }, 2500);
}
</script>
